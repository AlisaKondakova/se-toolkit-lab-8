services:
  nanobot:
    build:
      context: .
      dockerfile: nanobot/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      NANOBOT_ACCESS_KEY: mysecretkey123
      NANOBOT_WEBCHAT_CONTAINER_PORT: 8081
      QWEN_API_KEY: ${QWEN_CODE_API_KEY:-}
      QWEN_BASE_URL: http://qwen-code-api:8080/v1
      GATEWAY_BASE_URL: http://backend:42002
      LMS_API_KEY: ${LMS_API_KEY:-}
    networks:
      - lms-network
    depends_on:
      - backend
      - qwen-code-api

  client-web-flutter:
    build:
      context: ./nanobot-websocket-channel/client-web-flutter
    networks:
      - lms-network

  caddy:
    image: caddy:latest
    ports:
      - "42002:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      NANOBOT_WEBCHAT_CONTAINER_PORT: 8081
    depends_on:
      - nanobot
      - client-web-flutter
    networks:
      - lms-network

  backend:
    image: se-toolkit-lab-8-backend
    build: ./backend
    environment:
      NAME: backend
      DEBUG: "false"
      ADDRESS: 0.0.0.0
      PORT: 42002
      RELOAD: "false"
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 42002
      UVICORN_RELOAD: "false"
      LMS_API_KEY: ${LMS_API_KEY:-}
      BACKEND_ENABLE_INTERACTIONS: "true"
      BACKEND_ENABLE_LEARNERS: "true"
      CORS_ORIGINS: '["*"]'
      AUTOCHECKER_API_URL: https://auche.namaz.live
      AUTOCHECKER_API_LOGIN: a.kondakova@innopolis.university
      AUTOCHECKER_API_PASSWORD: AlisaKondakovadbsjakxn
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: lms
      DB_USER: postgres
      DB_PASSWORD: postgres
      OTEL_SERVICE_NAME: backend
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_PYTHON_LOG_CORRELATION: "true"
      DATABASE_URL: sqlite+aiosqlite:///app/data.db
    volumes:
      - backend-data:/app
    networks:
      - lms-network
    depends_on:
      - otel-collector
      - postgres

  qwen-code-api:
    image: se-toolkit-lab-8-qwen-code-api:latest
    ports:
      - "42005:8080"
    environment:
      PORT: ${QWEN_CODE_API_CONTAINER_PORT:-8080}
      ADDRESS: ${QWEN_CODE_API_CONTAINER_ADDRESS:-0.0.0.0}
      QWEN_CODE_API_KEY: ${QWEN_CODE_API_KEY:-}
      QWEN_CODE_AUTH_USE: "true"
      QWEN_CODE_API_AUTH_USE: "true"
      QWEN_CODE_API_MODEL: ${QWEN_CODE_API_MODEL:-coder-model}
      QWEN_CODE_API_LOG_LEVEL: ${QWEN_CODE_API_LOG_LEVEL:-info}
      QWEN_CODE_API_MAX_RETRIES: ${QWEN_CODE_API_MAX_RETRIES:-3}
      QWEN_CODE_API_RETRY_DELAY_MS: ${QWEN_CODE_API_RETRY_DELAY_MS:-1000}
      QWEN_CODE_API_LOG_REQUESTS: ${QWEN_CODE_API_LOG_REQUESTS:-true}
      DEFAULT_MODEL: ${QWEN_CODE_API_MODEL:-coder-model}
      MAX_RETRIES: ${QWEN_CODE_API_MAX_RETRIES:-3}
      RETRY_DELAY_MS: ${QWEN_CODE_API_RETRY_DELAY_MS:-1000}
      LOG_LEVEL: ${QWEN_CODE_API_LOG_LEVEL:-info}
      LOG_REQUESTS: ${QWEN_CODE_API_LOG_REQUESTS:-true}
    volumes:
      - ~/.qwen:/mnt/qwen-creds:ro
    networks:
      - lms-network

  # VictoriaLogs - log storage
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    ports:
      - "9428:9428"
    volumes:
      - victorialogs-data:/victoria-logs-data
    networks:
      - lms-network

  # VictoriaTraces - trace storage
  victoriatraces:
    image: victoriametrics/victoria-traces:latest
    ports:
      - "10428:8428"
    volumes:
      - victoriatraces-data:/victoria-traces-data
    networks:
      - lms-network

  # OpenTelemetry Collector - collects and forwards telemetry
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - victorialogs
      - victoriatraces
    networks:
      - lms-network

  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  lms-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
  client-web-flutter:
    driver: local
  victorialogs-data:
    driver: local
  victoriatraces-data:
    driver: local
  postgres-data:
    driver: local
